<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear Cuenta | María José Repostería</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --rose:       #c9697a;
  --rose-light: #e8a0aa;
  --rose-pale:  #f5dde0;
  --rose-bg:    #fdf5f6;
  --cream:      #fdf8f3;
  --brown:      #6b4c3b;
  --brown-mid:  #9a7060;
  --brown-pale: #e8dbd6;
  --text:       #3a2a26;
  --text-mid:   #7a5c54;
  --text-light: #b89a94;
  --white:      #ffffff;
}
 
body {
  font-family: 'Jost', sans-serif;
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--cream);
  color: var(--text);
}
 
/* ── PANEL IZQUIERDO (decorativo) ── */
.left-panel {
  background: var(--brown);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 60px 48px;
  position: relative;
  overflow: hidden;
}
.left-panel::before {
  content: '';
  position: absolute;
  top: -80px; right: -80px;
  width: 280px; height: 280px;
  border: 1px solid rgba(201,105,122,0.2);
  border-radius: 50%;
}
.left-panel::after {
  content: '';
  position: absolute;
  bottom: -60px; left: -60px;
  width: 200px; height: 200px;
  border: 1px solid rgba(201,105,122,0.15);
  border-radius: 50%;
}
.left-brand {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--white);
  text-align: center;
  line-height: 1.1;
  margin-bottom: 6px;
  position: relative; z-index: 1;
}
.left-brand span { color: var(--rose-light); font-style: italic; }
.left-tagline {
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  text-align: center;
  margin-bottom: 48px;
  position: relative; z-index: 1;
}
.left-img {
  width: 100%;
  max-width: 340px;
  aspect-ratio: 3/4;
  object-fit: cover;
  border-radius: 4px;
  opacity: 0.75;
  position: relative; z-index: 1;
}
.left-quote {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.05rem;
  color: rgba(255,255,255,0.55);
  text-align: center;
  margin-top: 36px;
  line-height: 1.7;
  max-width: 280px;
  position: relative; z-index: 1;
}
 
/* ── PANEL DERECHO (formulario) ── */
.right-panel {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 8%;
  background: var(--white);
}
 
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-light);
  text-decoration: none;
  margin-bottom: 48px;
  transition: color 0.25s;
}
.back-link:hover { color: var(--rose); }
.back-link::before { content: '←'; font-size: 0.9rem; }
 
.form-eyebrow {
  font-size: 0.68rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--rose);
  font-weight: 500;
  margin-bottom: 0.7rem;
}
.form-title {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--brown);
  line-height: 1.15;
  margin-bottom: 0.5rem;
}
.form-title em { font-style: italic; color: var(--rose); }
.form-sub {
  font-size: 0.9rem;
  font-weight: 300;
  color: var(--text-mid);
  margin-bottom: 2.2rem;
  line-height: 1.6;
}
 
/* ── CAMPOS ── */
.input-group { margin-bottom: 1.1rem; }
 
label {
  display: block;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-mid);
  margin-bottom: 6px;
}
 
input {
  width: 100%;
  padding: 12px 14px;
  font-family: 'Jost', sans-serif;
  font-size: 0.9rem;
  color: var(--text);
  background: var(--cream);
  border: 1px solid var(--brown-pale);
  border-radius: 2px;
  outline: none;
  transition: border-color 0.25s, background 0.25s;
}
input:focus {
  border-color: var(--rose);
  background: var(--white);
}
input::placeholder { color: var(--text-light); }
 
/* ── BOTÓN ── */
.btn-submit {
  width: 100%;
  padding: 14px;
  background: var(--rose);
  color: var(--white);
  font-family: 'Jost', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: none;
  border-radius: 2px;
  cursor: pointer;
  margin-top: 0.4rem;
  transition: background 0.25s, transform 0.2s;
}
.btn-submit:hover { background: var(--rose-light); transform: translateY(-1px); }
.btn-submit:active { transform: translateY(0); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
 
/* ── MENSAJE ── */
.mensaje {
  font-size: 0.84rem;
  text-align: center;
  padding: 10px 14px;
  border-radius: 2px;
  margin-top: 12px;
  display: none;
}
.mensaje.error   { display: block; background: #fdf0f0; color: #b94a4a; border: 1px solid #f0c8c8; }
.mensaje.success { display: block; background: #f0faf4; color: #3a7a55; border: 1px solid #b8e0c8; }
 
/* ── DIVIDER ── */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 1.4rem 0;
  color: var(--text-light);
  font-size: 0.75rem;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--brown-pale);
}
 
.login-link {
  text-align: center;
  font-size: 0.88rem;
  color: var(--text-mid);
}
.login-link a {
  color: var(--rose);
  text-decoration: none;
  font-weight: 500;
  border-bottom: 1px solid var(--rose-pale);
  padding-bottom: 1px;
  transition: border-color 0.25s;
}
.login-link a:hover { border-color: var(--rose); }
 
/* ── RESPONSIVE ── */
@media (max-width: 780px) {
  body { grid-template-columns: 1fr; }
  .left-panel { display: none; }
  .right-panel { padding: 48px 6%; min-height: 100vh; justify-content: center; }
}
</style>
</head>
<body>

 
<!-- Panel derecho -->
<div class="right-panel">
  <a href="index.html" class="back-link">Volver al inicio</a>
 
  <div class="form-eyebrow">Bienvenida</div>
  <h1 class="form-title">Crea tu <em>cuenta</em></h1>
  <p class="form-sub">Únete para hacer pedidos, guardar tus favoritos y recibir ofertas especiales.</p>
 
  <form id="registerForm" autocomplete="off">
    <div class="input-group">
      <label for="nombre">Nombre Completo</label>
      <input type="text" id="nombre" placeholder="Tu nombre completo" required>
    </div>
    <div class="input-group">
      <label for="correo">Correo Electrónico</label>
      <input type="email" id="correo" placeholder="correo@ejemplo.com" required>
    </div>
    <div class="input-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
    </div>
    <div class="input-group">
      <label for="confirmPassword">Confirmar Contraseña</label>
      <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required>
    </div>
 
    <button type="submit" class="btn-submit" id="submitBtn">Crear mi cuenta</button>
    <div class="mensaje" id="mensaje"></div>
  </form>
 
  <div class="divider">o</div>
 
  <div class="login-link">
    ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
  </div>
</div>
 
<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const nombre          = document.getElementById("nombre").value.trim();
  const correo          = document.getElementById("correo").value.trim();
  const password        = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const mensajeDiv      = document.getElementById("mensaje");
  const submitBtn       = document.getElementById("submitBtn");
 
  mensajeDiv.textContent = "";
  mensajeDiv.className = "mensaje";
 
  if (password !== confirmPassword) {
    mensajeDiv.textContent = "Las contraseñas no coinciden.";
    mensajeDiv.className = "mensaje error";
    return;
  }
 
  if (password.length < 6) {
    mensajeDiv.textContent = "La contraseña debe tener al menos 6 caracteres.";
    mensajeDiv.className = "mensaje error";
    return;
  }
 
  submitBtn.disabled = true;
  submitBtn.textContent = "Creando cuenta…";
 
  try {
    const res = await fetch("/api/usuarios", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nombre, correo, password })
    });
 
    let data;
    try { data = await res.json(); }
    catch { data = { mensaje: "Respuesta inesperada del servidor." }; }
 
    mensajeDiv.textContent = data.mensaje || (res.ok ? "¡Cuenta creada exitosamente!" : `Error ${res.status}`);
    mensajeDiv.className = "mensaje " + (res.ok ? "success" : "error");
 
    if (res.ok) {
      setTimeout(() => { window.location.href = "login.html"; }, 1600);
    }
  } catch (err) {
    mensajeDiv.textContent = "Error de conexión: " + err.message;
    mensajeDiv.className = "mensaje error";
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "Crear mi cuenta";
  }
});
</script>
 
</body>
</html>
