<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro | Pastelería</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; font-family:Arial,sans-serif; background:linear-gradient(135deg,#ff9eb5,#ffc1d6); display:flex; justify-content:center; align-items:center; height:100vh; }
.container { background:white; padding:40px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.2); width:350px; }
h2 { text-align:center; margin-bottom:25px; color:#ff4d88; }
.input-group { margin-bottom:15px; }
label { font-weight:bold; display:block; margin-bottom:5px; }
input { width:100%; padding:10px; border-radius:6px; border:1px solid #ccc; outline:none; }
input:focus { border-color:#ff4d88; }
.btn { width:100%; padding:10px; background:#ff4d88; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer; margin-top:10px; }
.btn:hover { opacity:0.9; }
.login-link { text-align:center; margin-top:15px; }
.login-link a { color:#ff4d88; text-decoration:none; font-weight:bold; }
.error { color:red; font-size:14px; margin-top:5px; text-align:center; }
.success { color:green; font-size:14px; margin-top:5px; text-align:center; }
</style>
</head>
<body>

<div class="container">
<h2>Crear Cuenta</h2>
<form id="registerForm">
<div class="input-group"><label>Nombre Completo</label><input type="text" id="nombre" required></div>
<div class="input-group"><label>Correo Electrónico</label><input type="email" id="correo" required></div>
<div class="input-group"><label>Contraseña</label><input type="password" id="password" required></div>
<div class="input-group"><label>Confirmar Contraseña</label><input type="password" id="confirmPassword" required></div>
<button type="submit" class="btn">Registrarse</button>
<div id="mensaje"></div>
</form>

<div class="login-link">
¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
</div>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const nombre = document.getElementById("nombre").value.trim();
    const correo = document.getElementById("correo").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const mensajeDiv = document.getElementById("mensaje");
    mensajeDiv.textContent = ""; 
    mensajeDiv.className = "";

    if(password !== confirmPassword){
        mensajeDiv.textContent = "Las contraseñas no coinciden ❌"; 
        mensajeDiv.className = "error";
        return;
    }

    try{
        const res = await fetch("/api/usuarios", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nombre, correo, password })
        });

        let data;
        try {
            data = await res.json();
        } catch (jsonErr) {
            data = { mensaje: "Respuesta no es JSON: " + await res.text() };
        }

        mensajeDiv.textContent = data.mensaje || (res.ok ? "Registro exitoso ✅" : `Error ${res.status}: ${res.statusText}`);
        mensajeDiv.className = res.ok ? "success" : "error";

        console.log("Response status:", res.status);
        console.log("Response data:", data);

        if (res.ok) {
            setTimeout(() => { window.location.href = "login.html"; }, 1500);
        }
    } catch (err) {
        mensajeDiv.textContent = "Error de conexión real: " + err.message;
        mensajeDiv.className = "error";
        console.error("Fetch error:", err);
    }
});
</script>

</body>
</html>
