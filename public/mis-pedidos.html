<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis Pedidos | María José Repostería</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --rose:       #c9697a;
  --rose-light: #e8a0aa;
  --rose-pale:  #f5dde0;
  --cream:      #fdf8f3;
  --brown:      #6b4c3b;
  --brown-mid:  #9a7060;
  --brown-pale: #e8dbd6;
  --text:       #3a2a26;
  --text-mid:   #7a5c54;
  --text-light: #b89a94;
  --white:      #ffffff;
  --success:    #3a7a55;
  --success-bg: #f0faf4;
  --warning:    #8a6a1a;
  --warning-bg: #fdf7e8;
  --info:       #1a5a8a;
  --info-bg:    #e8f4fd;
  --danger:     #8a2a2a;
  --danger-bg:  #fdf0f0;
}
 
body {
  font-family: 'Jost', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
}
 
/* ── HEADER ── */
header {
  background: var(--white);
  border-bottom: 1px solid var(--brown-pale);
  padding: 0 6%;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(107,76,59,0.06);
}
.header-brand {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--brown);
  text-decoration: none;
}
.header-brand span { color: var(--rose); font-style: italic; }
 
.header-nav { display: flex; align-items: center; gap: 16px; }
 
.btn-header {
  font-family: 'Jost', sans-serif;
  font-size: 0.76rem;
  font-weight: 500;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  padding: 8px 18px;
  border-radius: 2px;
  cursor: pointer;
  border: none;
  text-decoration: none;
  transition: all 0.25s;
}
.btn-header-ghost {
  background: transparent;
  color: var(--text-light);
  border: 1px solid var(--brown-pale);
}
.btn-header-ghost:hover { color: var(--rose); border-color: var(--rose); }
.btn-header-primary { background: var(--rose); color: var(--white); }
.btn-header-primary:hover { background: var(--rose-light); }
 
/* ── PAGE ── */
.page {
  max-width: 860px;
  margin: 0 auto;
  padding: 52px 24px 100px;
}
 
.page-eyebrow {
  font-size: 0.68rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--rose);
  font-weight: 500;
  margin-bottom: 0.5rem;
}
.page-title {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--brown);
  margin-bottom: 0.4rem;
}
.page-title em { font-style: italic; color: var(--rose); }
.page-sub {
  font-size: 0.9rem;
  font-weight: 300;
  color: var(--text-light);
  margin-bottom: 2.4rem;
}
 
/* ── CARGANDO ── */
.loading {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.9rem;
  color: var(--text-light);
  padding: 40px 0;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--brown-pale);
  border-top-color: var(--rose);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
 
/* ── SIN PEDIDOS ── */
.sin-pedidos {
  background: var(--white);
  border: 1px solid var(--brown-pale);
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 72px 24px;
  text-align: center;
  gap: 14px;
}
.sin-pedidos-icon { font-size: 3rem; opacity: 0.3; }
.sin-pedidos p { font-size: 1rem; color: var(--text-light); font-weight: 300; }
.sin-pedidos a {
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--rose);
  text-decoration: none;
  border-bottom: 1px solid var(--rose-pale);
  padding-bottom: 2px;
  font-weight: 500;
  transition: border-color 0.25s;
}
.sin-pedidos a:hover { border-color: var(--rose); }
 
/* ── PEDIDO CARD ── */
.pedido {
  background: var(--white);
  border: 1px solid var(--brown-pale);
  border-radius: 4px;
  margin-bottom: 16px;
  overflow: hidden;
  transition: box-shadow 0.25s;
}
.pedido:hover { box-shadow: 0 8px 24px rgba(107,76,59,0.1); }
 
.pedido-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  cursor: pointer;
  user-select: none;
  gap: 16px;
}
.pedido-header:hover { background: var(--cream); }
 
.pedido-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  flex: 1;
  min-width: 0;
}
.pedido-num {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--brown);
  white-space: nowrap;
}
.pedido-fecha {
  font-size: 0.8rem;
  color: var(--text-light);
  font-weight: 300;
}
.pedido-total {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--rose);
  white-space: nowrap;
}
 
.pedido-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
 
/* Estado badge */
.estado {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 2px;
  white-space: nowrap;
}
.estado.Pendiente  { background: var(--warning-bg); color: var(--warning); border: 1px solid #e8d098; }
.estado.Enviado    { background: var(--info-bg);    color: var(--info);    border: 1px solid #98c8e8; }
.estado.Entregado  { background: var(--success-bg); color: var(--success); border: 1px solid #98d8b8; }
.estado.Cancelado  { background: var(--danger-bg);  color: var(--danger);  border: 1px solid #e8b8b8; }
 
.chevron {
  font-size: 0.75rem;
  color: var(--text-light);
  transition: transform 0.3s;
  flex-shrink: 0;
}
.pedido.open .chevron { transform: rotate(180deg); }
 
/* Productos expandibles */
.pedido-body {
  display: none;
  border-top: 1px solid var(--brown-pale);
  padding: 20px 24px 24px;
  background: var(--cream);
}
.pedido.open .pedido-body { display: block; }
 
.producto-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.88rem;
  color: var(--text-mid);
  padding: 8px 0;
  border-bottom: 1px dashed var(--brown-pale);
}
.producto-item:last-of-type { border-bottom: none; }
.producto-item span:first-child { font-weight: 400; }
.producto-item span:last-child  { font-weight: 500; color: var(--text); }
 
.pedido-total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--brown-pale);
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--brown);
}
.pedido-total-row span:last-child { color: var(--rose); }
 
.btn-eliminar-pedido {
  margin-top: 18px;
  font-family: 'Jost', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-light);
  background: transparent;
  border: 1px solid var(--brown-pale);
  border-radius: 2px;
  padding: 8px 16px;
  cursor: pointer;
  transition: color 0.25s, border-color 0.25s;
}
.btn-eliminar-pedido:hover { color: var(--danger); border-color: #e8b8b8; }
 
/* ── ERROR ── */
.error-msg {
  background: var(--danger-bg);
  border: 1px solid #e8b8b8;
  color: var(--danger);
  font-size: 0.88rem;
  padding: 14px 18px;
  border-radius: 2px;
  margin-top: 20px;
}
 
/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 32px; right: 32px;
  background: var(--brown);
  color: var(--white);
  font-family: 'Jost', sans-serif;
  font-size: 0.85rem;
  padding: 14px 24px;
  border-radius: 3px;
  z-index: 9999;
  box-shadow: 0 8px 24px rgba(107,76,59,0.25);
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
 
/* ── FAB ── */
.fab {
  position: fixed;
  bottom: 32px; right: 32px;
  background: var(--rose);
  color: var(--white);
  border: none;
  width: 52px; height: 52px;
  border-radius: 50%;
  font-size: 1.5rem;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(201,105,122,0.4);
  transition: background 0.25s, transform 0.2s;
  display: flex; align-items: center; justify-content: center;
  z-index: 50;
}
.fab:hover { background: var(--rose-light); transform: scale(1.08); }
 
/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .page { padding: 32px 16px 80px; }
  .pedido-meta { flex-direction: column; align-items: flex-start; gap: 4px; }
  .pedido-header { flex-wrap: wrap; }
}
</style>
</head>
<body>
 
<!-- ── HEADER ── -->
<header>
  <a href="index.html" class="header-brand">María <span>José</span></a>
  <div class="header-nav">
    <button class="btn-header btn-header-ghost" onclick="window.location.href='carrito.html'">🛒 Carrito</button>
    <button class="btn-header btn-header-primary" onclick="window.location.href='index.html'">Inicio</button>
  </div>
</header>
 
<!-- ── PAGE ── -->
<div class="page">
  <div class="page-eyebrow">Tu historial</div>
  <h1 class="page-title">Mis <em>pedidos</em></h1>
  <p class="page-sub">Consulta el estado y detalle de todos tus pedidos.</p>
 
  <div id="listaPedidos"></div>
  <div id="mensajeError"></div>
</div>
 
<!-- FAB -->
<button class="fab" onclick="window.location.href='index.html'" title="Nuevo pedido">+</button>
 
<!-- Toast -->
<div class="toast" id="toast"></div>
 
<script>
const API = "";
const usuario = JSON.parse(localStorage.getItem("usuario"));
 
if (!usuario) {
  alert("Debes iniciar sesión primero.");
  window.location.href = "login.html";
}
 
const listaPedidos  = document.getElementById("listaPedidos");
const mensajeError  = document.getElementById("mensajeError");
 
document.addEventListener("DOMContentLoaded", cargarPedidos);
 
function mostrarToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}
 
async function cargarPedidos() {
  mensajeError.innerHTML = "";
  listaPedidos.innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <span>Cargando tus pedidos…</span>
    </div>`;
 
  try {
    const response = await fetch(`${API}/api/pedidos/usuario/${usuario.correo}`);
    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(`Status ${response.status}: ${errorText}`);
    }
    const pedidos = await response.json();
    listaPedidos.innerHTML = "";
 
    if (!pedidos.length) {
      listaPedidos.innerHTML = `
        <div class="sin-pedidos">
          <div class="sin-pedidos-icon">🧁</div>
          <p>Aún no has realizado ningún pedido.</p>
          <a href="index.html">Explorar productos</a>
        </div>`;
      return;
    }
 
    pedidos.forEach((pedido, index) => {
      const pedidoDiv = document.createElement("div");
      pedidoDiv.classList.add("pedido");
      pedidoDiv.id = `pedido-${pedido._id}`;
 
      const fecha = new Date(pedido.createdAt).toLocaleDateString("es-ES", {
        day: "numeric", month: "long", year: "numeric"
      });
 
      let productosHTML = pedido.productos.map(p => `
        <div class="producto-item">
          <span>${p.nombre}${p.opcion ? ' <em style="color:var(--rose-light)">· ' + p.opcion + '</em>' : ''} ×${p.cantidad}</span>
          <span>$${(Number(p.precio) * p.cantidad).toFixed(2)}</span>
        </div>
      `).join("");
 
      pedidoDiv.innerHTML = `
        <div class="pedido-header" onclick="togglePedido('${pedido._id}')">
          <div class="pedido-meta">
            <span class="pedido-num">Pedido #${index + 1}</span>
            <span class="pedido-fecha">${fecha}</span>
          </div>
          <div class="pedido-right">
            <span class="estado ${pedido.estado}">${pedido.estado}</span>
            <span class="pedido-total">$${Number(pedido.total).toFixed(2)}</span>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="pedido-body">
          ${productosHTML}
          <div class="pedido-total-row">
            <span>Total pagado</span>
            <span>$${Number(pedido.total).toFixed(2)}</span>
          </div>
          <button class="btn-eliminar-pedido" onclick="eliminarPedido('${pedido._id}')">Eliminar pedido</button>
        </div>
      `;
 
      listaPedidos.appendChild(pedidoDiv);
    });
 
  } catch (error) {
    listaPedidos.innerHTML = "";
    mensajeError.innerHTML = `<div class="error-msg">Error al cargar pedidos: ${error.message}</div>`;
    console.error("Fetch error en mis-pedidos:", error);
  }
}
 
function togglePedido(id) {
  const card = document.getElementById(`pedido-${id}`);
  card.classList.toggle("open");
}
 
async function eliminarPedido(id) {
  if (!confirm("¿Deseas eliminar este pedido?")) return;
 
  try {
    const res = await fetch(`${API}/api/pedidos/${id}`, { method: "DELETE" });
    if (!res.ok) {
      const errorText = await res.text();
      throw new Error(`Status ${res.status}: ${errorText}`);
    }
 
    const tarjeta = document.getElementById(`pedido-${id}`);
    if (tarjeta) {
      tarjeta.style.transition = "opacity 0.3s, transform 0.3s";
      tarjeta.style.opacity = "0";
      tarjeta.style.transform = "translateX(20px)";
      setTimeout(() => { tarjeta.remove(); cargarPedidos(); }, 300);
    }
 
    mostrarToast("Pedido eliminado correctamente.");
  } catch (err) {
    mostrarToast("Error al eliminar: " + err.message);
    console.error("Delete error:", err);
  }
}
</script>
 
</body>
</html>
