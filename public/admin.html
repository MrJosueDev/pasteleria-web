<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin - Pastelería</title>

<!-- OneSignal Push Integration (si ya lo agregaste, déjalo; si no, pégalo aquí antes de </head>) -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "6340c3d5-c21f-4f72-9bd1-498510575ddf",
      safari_web_id: "web.onesignal.auto.39e347a3-7290-467c-af89-3542a6fc2365",
      notifyButton: {
        enable: true,
      },
    });
  });
</script>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#141e30,#243b55);
    color:white;
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:230px;
    background:#0f172a;
    padding:25px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.sidebar h2{
    text-align:center;
}

.sidebar button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#c0392b;
    color:white;
    cursor:pointer;
}

.main{
    flex:1;
    padding:40px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

select{
    padding:5px;
    border-radius:6px;
    border:none;
}

.deleteBtn{
    padding:8px 12px;
    background:#e74c3c;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
    margin-top:10px;
}
.deleteBtn:hover{
    opacity:0.9;
}

.ubicacionBtn{
    padding:8px 12px;
    background:#38bdf8;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
    margin-top:10px;
}
.ubicacionBtn:hover{
    opacity:0.9;
}

/* Notificación flotante para nuevos pedidos */
#notif-nuevo-pedido {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #ff4d88;
    color: white;
    padding: 15px 25px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    z-index: 1000;
    display: none;
    animation: slideIn 0.5s forwards;
}

@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>ADMIN</h2>
    <button id="logoutBtn">Cerrar sesión</button>
</div>

<div class="main">
    <h1>Panel de Administración</h1>
    <div id="pedidosContainer"></div>
</div>

<!-- Notificación flotante -->
<div id="notif-nuevo-pedido"></div>

<script>
const API = "";  // Relativa: mismo dominio (funciona en local y Render)
const usuario = JSON.parse(localStorage.getItem("usuario"));

if(!usuario || usuario.role !== "admin"){
    alert("Acceso solo para administradores");
    window.location.href = "login.html";
}

let pedidosAnteriores = 0;  // Para detectar nuevos pedidos

// ======================
// CARGAR PEDIDOS
// ======================
async function cargarPedidos(){
    const container = document.getElementById("pedidosContainer");
    container.innerHTML = "<p>Cargando pedidos...</p>";

    try{
        const res = await fetch(`${API}/api/pedidos`);
        if (!res.ok) {
            const errorText = await res.text();
            throw new Error(`Status ${res.status}: ${errorText}`);
        }
        const pedidos = await res.json();

        container.innerHTML = "";

        if(pedidos.length === 0){
            container.innerHTML = "<p>No hay pedidos aún.</p>";
            pedidosAnteriores = 0;
            return;
        }

        pedidos.forEach(pedido => {

            let productosHTML = "";
            pedido.productos.forEach(p => {
                productosHTML += `<li>${p.nombre} x${p.cantidad} - $${p.precio}</li>`;
            });

            let coords = "";
            if(pedido.direccion && pedido.direccion.includes("Lat:") && pedido.direccion.includes("Lon:")){
                const parts = pedido.direccion.match(/Lat: ([0-9\.\-]+), Lon: ([0-9\.\-]+)/);
                if(parts){
                    coords = { lat: parts[1], lon: parts[2] };
                }
            }

            container.innerHTML += `
            <div class="card" id="pedido-${pedido._id}">
                <h3>Pedido de ${pedido.nombreCliente}</h3>
                <p><strong>Correo:</strong> ${pedido.usuario}</p>
                <p><strong>Teléfono:</strong> ${pedido.telefono || 'No proporcionado'}</p>
                <p><strong>Dirección:</strong> ${pedido.direccion}</p>
                <p><strong>Total:</strong> $${pedido.total}</p>
                <p><strong>Estado:</strong> 
                    <select onchange="cambiarEstado('${pedido._id}', this.value)">
                        <option ${pedido.estado==="Pendiente"?"selected":""}>Pendiente</option>
                        <option ${pedido.estado==="Enviado"?"selected":""}>Enviado</option>
                        <option ${pedido.estado==="Entregado"?"selected":""}>Entregado</option>
                    </select>
                </p>
                <p><strong>Productos:</strong></p>
                <ul>${productosHTML}</ul>
                ${coords ? `<button class="ubicacionBtn" onclick="verUbicacion('${coords.lat}','${coords.lon}')">Ver Ubicación</button>` : ""}
                <button class="deleteBtn" onclick="eliminarPedido('${pedido._id}')">Eliminar Pedido</button>
            </div>
            `;
        });

        // Actualiza la cantidad anterior para el polling
        pedidosAnteriores = pedidos.length;

    }catch(error){
        container.innerHTML = "";
        alert("Error cargando pedidos: " + error.message);
        console.error("Fetch error en admin:", error);
    }
}

// ======================
// CHEQUEO DE NUEVOS PEDIDOS (cada 30 segundos) + notificación
setInterval(async () => {
  try {
    const res = await fetch(`${API}/api/pedidos`);
    if (!res.ok) return;
    const pedidos = await res.json();

    if (pedidos.length > pedidosAnteriores) {
      const nuevos = pedidos.length - pedidosAnteriores;
      const notif = document.getElementById("notif-nuevo-pedido");
      notif.innerHTML = `¡${nuevos} nuevo(s) pedido(s)! 🔔`;
      notif.style.display = "block";
      setTimeout(() => { notif.style.display = "none"; }, 5000);  // Desaparece en 5 seg

      // Sonido opcional (descomenta si querés)
      // new Audio('https://assets.mixkit.co/sfx/preview/mixkit-bell-notification-1007.mp3').play();

      // Recarga la lista automáticamente
      cargarPedidos();
    }

    pedidosAnteriores = pedidos.length;
  } catch (err) {
    console.error("Error en polling de nuevos pedidos:", err);
  }
}, 30000);  // 30 segundos

// ======================
// CAMBIAR ESTADO
// ======================
async function cambiarEstado(id, nuevoEstado){
    try{
        const res = await fetch(`${API}/api/pedidos/${id}`,{
            method:"PUT",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ estado: nuevoEstado })
        });

        if (!res.ok) {
            const errorText = await res.text();
            throw new Error(`Status ${res.status}: ${errorText}`);
        }

        cargarPedidos();
        alert("Estado actualizado correctamente ✅");
    }catch(err){
        alert("Error al cambiar estado: " + err.message);
        console.error("Error cambiar estado:", err);
    }
}

// ======================
// ELIMINAR PEDIDO
// ======================
async function eliminarPedido(id){
    if(!confirm("¿Deseas eliminar este pedido? ❌")) return;

    try{
        const res = await fetch(`${API}/api/pedidos/${id}`, {
            method: "DELETE"
        });

        if(!res.ok){
            const errorText = await res.text();
            throw new Error(`Status ${res.status}: ${errorText}`);
        }

        const tarjeta = document.getElementById(`pedido-${id}`);
        if(tarjeta) tarjeta.remove();

        alert("Pedido eliminado correctamente ✅");
        cargarPedidos();

    }catch(err){
        alert("Error al eliminar el pedido: " + err.message);
        console.error("Delete error:", err);
    }
}

// ======================
// VER UBICACIÓN
// ======================
function verUbicacion(lat, lon){
    window.open(`https://www.google.com/maps?q=${lat},${lon}`, "_blank");
}

// ======================
document.getElementById("logoutBtn").addEventListener("click", ()=>{
    localStorage.clear();
    window.location.href = "login.html";
});

cargarPedidos();
</script>

</body>
</html>
