<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

}

}

/* ── TOAST ── */
.toast {

  color: var(--text);

  padding: 14px 22px;
  border-radius: 3px;
  z-index: 9999;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);

  transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);

}
.toast.show { transform: translateY(0); opacity: 1; }

/* ── NOTIF NUEVO PEDIDO ── */
#notif-nuevo-pedido {
  position: fixed;
  top: 20px; right: 20px;

  from { transform: translateX(110%); opacity: 0; }

/* ── RESPONSIVE ── */

  <!-- Topbar -->

    <div class="topbar-title">Panel de <em style="font-style:italic;color:var(--rose-light)">Pedidos</em></div>
    <div class="topbar-right">
      <span class="topbar-time" id="reloj"></span>
      <button class="btn-refresh" onclick="cargarPedidos()">↻ Actualizar</button>
    </div>
  </div>
 
  <!-- Content -->

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card rose">
        <div class="stat-label">Total pedidos</div>
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-sub">Todos los estados</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pendientes</div>
        <div class="stat-value" id="statPendiente" style="color:var(--warning)">—</div>
        <div class="stat-sub">En espera</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Entregados</div>
        <div class="stat-value" id="statEntregado">—</div>
        <div class="stat-sub">Completados</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-label">Recaudado</div>

      <button class="filter-btn" data-filter="Enviado" onclick="filtrar('Enviado', this)">Enviados</button>
      <button class="filter-btn" data-filter="Entregado" onclick="filtrar('Entregado', this)">Entregados</button>
    </div>

  </div>

<!-- Toast -->

<script>
const API = "";
const usuario = JSON.parse(localStorage.getItem("usuario"));
 
if (!usuario || usuario.role !== "admin") {
  alert("Acceso solo para administradores.");
  window.location.href = "login.html";
}
 
// Admin info
document.getElementById("adminName").textContent = usuario.nombre || "Admin";
document.getElementById("adminInitial").textContent = (usuario.nombre || "A")[0].toUpperCase();
 
let todosLosPedidos = [];
let pedidosAnteriores = 0;
let filtroActual = "todos";
 
// ── Reloj ──
function actualizarReloj() {
  const now = new Date();
  document.getElementById("reloj").textContent = now.toLocaleTimeString("es-ES", {
    hour: "2-digit", minute: "2-digit", second: "2-digit"
  });
}
actualizarReloj();
setInterval(actualizarReloj, 1000);
 
// ── Toast ──
function mostrarToast(msg, tipo = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + tipo;
  setTimeout(() => t.className = "toast", 3000);
}
 
// ── Filtrar ──
function filtrar(estado, btn) {
  filtroActual = estado;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderPedidos(todosLosPedidos);
}
 
// ── Stats ──
function actualizarStats(pedidos) {
  const total     = pedidos.length;
  const pendiente = pedidos.filter(p => p.estado === "Pendiente").length;
  const entregado = pedidos.filter(p => p.estado === "Entregado").length;
  const recaudado = pedidos.reduce((a, p) => a + Number(p.total), 0);
  document.getElementById("statTotal").textContent     = total;
  document.getElementById("statPendiente").textContent = pendiente;
  document.getElementById("statEntregado").textContent = entregado;
  document.getElementById("statRecaudado").textContent = "$" + recaudado.toFixed(0);
}
 
// ── Render ──
function renderPedidos(pedidos) {
  const container = document.getElementById("pedidosContainer");
  const filtrados = filtroActual === "todos" ? pedidos : pedidos.filter(p => p.estado === filtroActual);
 
  document.getElementById("pedidosCount").textContent = filtrados.length + " pedido" + (filtrados.length !== 1 ? "s" : "");
 
  if (filtrados.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🧁</div>
        <p>No hay pedidos${filtroActual !== "todos" ? " con estado " + filtroActual : ""} por ahora.</p>
      </div>`;
    return;
  }
 
  container.innerHTML = "";
 
  filtrados.forEach((pedido, index) => {
    const fecha = new Date(pedido.createdAt).toLocaleDateString("es-ES", {
      day: "numeric", month: "short", year: "numeric"
    });
 
    // Detectar coordenadas en dirección
    let coordsHTML = "";
    const coordMatch = (pedido.direccion || "").match(/Lat: ([0-9.\-]+), Lon: ([0-9.\-]+)/);
    if (coordMatch) {
      coordsHTML = `<button class="btn-action btn-map" onclick="verUbicacion('${coordMatch[1]}','${coordMatch[2]}')">📍 Ver ubicación</button>`;
    }
 
    const productosHTML = pedido.productos.map(p =>
      `<li class="producto-row">
        <span>${p.nombre}${p.opcion ? ' <em style="color:var(--rose-light)">· ' + p.opcion + '</em>' : ''} ×${p.cantidad}</span>
        <span>$${(Number(p.precio) * p.cantidad).toFixed(2)}</span>
      </li>`
    ).join("");
 
    const card = document.createElement("div");
    card.classList.add("pedido-card");
    card.id = `pedido-${pedido._id}`;
    card.innerHTML = `
      <div class="pedido-card-header" onclick="toggleCard('${pedido._id}')">
        <div class="pedido-left">
          <div class="pedido-avatar">🧁</div>
          <div>
            <div class="pedido-cliente">${pedido.nombreCliente}</div>
            <div class="pedido-meta-sub">${pedido.usuario} · ${fecha}</div>
          </div>
        </div>
        <div class="pedido-right">
          <select class="estado-select ${pedido.estado}"
            onchange="cambiarEstado('${pedido._id}', this)"
            onclick="event.stopPropagation()">
            <option ${pedido.estado==="Pendiente"?"selected":""}>Pendiente</option>
            <option ${pedido.estado==="Enviado"?"selected":""}>Enviado</option>
            <option ${pedido.estado==="Entregado"?"selected":""}>Entregado</option>
            <option ${pedido.estado==="Cancelado"?"selected":""}>Cancelado</option>
          </select>
          <span class="pedido-total-badge">$${Number(pedido.total).toFixed(2)}</span>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="pedido-card-body">
        <div class="pedido-detail-grid">
          <div class="detail-field">
            <div class="detail-label">Teléfono</div>
            <div class="detail-value">${pedido.telefono || "No proporcionado"}</div>
          </div>
          <div class="detail-field">
            <div class="detail-label">Dirección</div>
            <div class="detail-value">${pedido.direccion}</div>
          </div>
          <div class="detail-field">
            <div class="detail-label">Total pagado</div>
            <div class="detail-value" style="color:var(--gold);font-weight:600;">$${Number(pedido.total).toFixed(2)}</div>
          </div>
        </div>
        <div class="productos-title">Productos del pedido</div>
        <ul class="productos-list">${productosHTML}</ul>
        <div class="card-actions">
          ${coordsHTML}
          <button class="btn-action btn-delete" onclick="eliminarPedido('${pedido._id}')">🗑 Eliminar pedido</button>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}
 
// ── Cargar pedidos ──
async function cargarPedidos() {
  const container = document.getElementById("pedidosContainer");
  container.innerHTML = `<div class="loading-state"><div class="spinner"></div><span>Cargando pedidos…</span></div>`;
 
  try {
    const res = await fetch(`${API}/api/pedidos`);
    if (!res.ok) throw new Error(`Status ${res.status}`);
    const pedidos = await res.json();
 
    todosLosPedidos = pedidos;
    actualizarStats(pedidos);
    renderPedidos(pedidos);
    pedidosAnteriores = pedidos.length;
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Error al cargar: ${err.message}</p></div>`;
    console.error("Error en admin:", err);
  }
}
 
// ── Toggle card ──
function toggleCard(id) {
  const card = document.getElementById(`pedido-${id}`);
  card.classList.toggle("open");
}
 
// ── Cambiar estado ──
async function cambiarEstado(id, selectEl) {
  const nuevoEstado = selectEl.value;
  // Update select style immediately
  selectEl.className = `estado-select ${nuevoEstado}`;
  try {
    const res = await fetch(`${API}/api/pedidos/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ estado: nuevoEstado })
    });
    if (!res.ok) throw new Error(`Status ${res.status}`);
    mostrarToast(`Estado actualizado: ${nuevoEstado}`, "success");
    await cargarPedidos();
  } catch (err) {
    mostrarToast("Error al cambiar estado: " + err.message, "error");
    console.error(err);
  }
}
 
// ── Eliminar pedido ──
async function eliminarPedido(id) {
  if (!confirm("¿Deseas eliminar este pedido?")) return;
  try {
    const res = await fetch(`${API}/api/pedidos/${id}`, { method: "DELETE" });
    if (!res.ok) throw new Error(`Status ${res.status}`);
    const card = document.getElementById(`pedido-${id}`);
    if (card) {
      card.style.transition = "opacity 0.3s, transform 0.3s";
      card.style.opacity = "0";
      card.style.transform = "translateX(16px)";
      setTimeout(() => { card.remove(); cargarPedidos(); }, 300);
    }
    mostrarToast("Pedido eliminado.", "success");
  } catch (err) {
    mostrarToast("Error al eliminar: " + err.message, "error");
    console.error(err);
  }
}
 
// ── Ver ubicación ──
function verUbicacion(lat, lon) {
  window.open(`https://www.google.com/maps?q=${lat},${lon}`, "_blank");
}
 
// ── Polling nuevos pedidos ──
setInterval(async () => {
  try {
    const res = await fetch(`${API}/api/pedidos`);
    if (!res.ok) return;
    const pedidos = await res.json();
    if (pedidos.length > pedidosAnteriores) {
      const nuevos = pedidos.length - pedidosAnteriores;
      const notif = document.getElementById("notif-nuevo-pedido");
      notif.textContent = `🔔 ${nuevos} nuevo${nuevos > 1 ? "s" : ""} pedido${nuevos > 1 ? "s" : ""} recibido${nuevos > 1 ? "s" : ""}`;
      notif.style.display = "block";
      setTimeout(() => { notif.style.display = "none"; }, 5000);
      cargarPedidos();
    }
    pedidosAnteriores = pedidos.length;
  } catch (err) {
    console.error("Polling error:", err);
  }
}, 30000);
 
// ── Logout ──
document.getElementById("logoutBtn").addEventListener("click", () => {
  localStorage.clear();
  window.location.href = "login.html";
});
 
cargarPedidos();
</script>
