<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pagos | Pastelería</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#fff0f5,#ffe4ec);
}
header{
    background:linear-gradient(90deg,#ff4d88,#ff7aa2);
    padding:15px 40px;
    color:white;
}
h1{ margin:0; font-family:Georgia, serif; font-weight:normal; }
.pago-container{
    max-width:600px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}
h2{ color:#ff4d88; margin-bottom:20px; }
input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#ff4d88;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
button:hover{ background:#e6005c; }
.total{
    font-size:20px;
    font-weight:bold;
    color:#ff4d88;
    margin-bottom:20px;
}
.mensaje-envio{
    color:#b30059;
    font-weight:bold;
    margin-bottom:15px;
    text-align:center;
}
.mensaje{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}
.success { color:green; }
.error { color:red; }
</style>
</head>

<body>

<header>
    <h1>Pago 💳</h1>
</header>

<div class="pago-container">
    <h2>Finalizar Pedido</h2>

    <div class="total">
        Total a pagar: $<span id="total">0.00</span>
    </div>

    <input type="text" id="nombre" placeholder="Nombre completo / Full name" required>
    <input type="tel" id="telefono" placeholder="Número telefónico / Phone number (ej: +1 555-123-4567)" required>
    <input type="text" id="direccion" placeholder="Dirección de entrega / Delivery address" required>

    <!-- Mensaje de gastos de envío -->
    <p class="mensaje-envio">⚠️ Nota: Los gastos de envío correrán por tu cuenta / Shipping fees apply.</p>

    <button onclick="confirmarPago()">Confirmar Pedido (Simular Pago) / Confirm Order (Simulate Payment)</button>

    <div id="mensaje" class="mensaje"></div>
</div>

<script>
const API = "";  // Relativa: mismo dominio (funciona en local y Render)
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let usuario = JSON.parse(localStorage.getItem("usuario"));

if(!usuario){
    alert("Debes iniciar sesión para continuar / You must log in to continue.");
    window.location.href = "login.html";
}

if(carrito.length === 0){
    alert("Tu carrito está vacío / Your cart is empty.");
    window.location.href = "carrito.html";
}

// Mostrar total
function calcularTotal(){
    let total = carrito.reduce((acc, item) => acc + (Number(item.precio) * item.cantidad), 0);
    document.getElementById("total").textContent = total.toFixed(2);
    return total;
}
calcularTotal();

// ====== Simular pago y guardar pedido ======
async function confirmarPago(){
    const nombre = document.getElementById("nombre").value.trim();
    const telefono = document.getElementById("telefono").value.trim();
    const direccion = document.getElementById("direccion").value.trim();
    const mensajeDiv = document.getElementById("mensaje");
    mensajeDiv.textContent = "";
    mensajeDiv.className = "";

    if(!nombre || !telefono || !direccion){
        mensajeDiv.textContent = "Por favor completa nombre, teléfono y dirección / Please complete name, phone and address.";
        mensajeDiv.className = "error";
        return;
    }

    // Validación flexible de teléfono (8-15 dígitos, con o sin +)
    if (!/^\+?\d{8,15}$/.test(telefono.replace(/[\-\s]/g, ''))) {
        mensajeDiv.textContent = "El teléfono debe tener entre 8 y 15 dígitos / Phone number must be 8-15 digits.";
        mensajeDiv.className = "error";
        return;
    }

    const total = calcularTotal();

    const pedido = {
        usuario: usuario.correo,
        nombreCliente: nombre,
        telefono: telefono,
        direccion: direccion,
        productos: carrito,
        total: total
    };

    try {
        const res = await fetch(`${API}/api/pedidos`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(pedido)
        });

        const data = await res.json();

        if(res.ok){
            mensajeDiv.textContent = "¡Pedido registrado exitosamente! 🎉 Redirigiendo... / Order registered successfully! Redirecting...";
            mensajeDiv.className = "success";
            localStorage.removeItem("carrito"); // Limpia carrito
            setTimeout(() => {
                window.location.href = "mis-pedidos.html";
            }, 1500);
        } else {
            mensajeDiv.textContent = data.mensaje || "Error al registrar el pedido / Error registering order.";
            mensajeDiv.className = "error";
        }
    } catch (err) {
        mensajeDiv.textContent = "Error de conexión con el servidor / Server connection error: " + err.message;
        mensajeDiv.className = "error";
        console.error("Error en pago:", err);
    }
}
</script>

</body>
</html>
