<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pagos | José María</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#fff0f5,#ffe4ec);
}
header{
    background:linear-gradient(90deg,#ff4d88,#ff7aa2);
    padding:15px 40px;
    color:white;
}
h1{ margin:0; font-family:Georgia, serif; font-weight:normal; }
.pago-container{
    max-width:600px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}
h2{ color:#ff4d88; margin-bottom:20px; }
input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#ff4d88;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
button:hover{ background:#e6005c; }
.total{
    font-size:20px;
    font-weight:bold;
    color:#ff4d88;
    margin-bottom:20px;
}
#gpsBtn{
    background:#38bdf8;
    margin-bottom:15px;
}
#gpsBtn:hover{ background:#0ea5e9; }
.mensaje-envio{
    color:#b30059;
    font-weight:bold;
    margin-bottom:15px;
    text-align:center;
}
</style>

<!-- SDK PayPal: solo PayPal, deshabilita tarjetas -->
<script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD&disable-funding=card"></script>

</head>

<body>

<header>
    <h1>Pago 💳</h1>
</header>

<div class="pago-container">
    <h2>Finalizar Pedido</h2>

    <div class="total">
        Total a pagar: $<span id="total">0.00</span>
    </div>

    <input type="text" id="nombre" placeholder="Nombre completo" required>
    <input type="text" id="direccion" placeholder="Dirección de entrega" required>
    <button id="gpsBtn" onclick="usarUbicacion()">Usar mi ubicación GPS 📍</button>

    <!-- Mensaje de gastos de envío -->
    <p class="mensaje-envio">⚠️ Nota: Los gastos de envío correrán por tu cuenta.</p>

    <div id="paypal-button-container"></div>
</div>

<script>
const API = "http://localhost:5000";
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let usuario = JSON.parse(localStorage.getItem("usuario"));

if(!usuario){
    alert("Debes iniciar sesión para continuar.");
    window.location.href = "login.html";
}

// Mostrar total
function calcularTotal(){
    let total = carrito.reduce((acc, item) => acc + (Number(item.precio)*item.cantidad),0);
    document.getElementById("total").textContent = total.toFixed(2);
}
calcularTotal();

// ====== Ubicación GPS con confirmación ======
function usarUbicacion(){
    if(confirm("¿Estás seguro que quieres usar tu ubicación? 📍")){
        if(navigator.geolocation){
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    document.getElementById("direccion").value = `Lat: ${lat}, Lon: ${lon}`;
                    alert("✅ Ubicación obtenida correctamente");
                },
                err => {
                    alert("No se pudo obtener la ubicación. Por favor escribe tu dirección manualmente.");
                }
            );
        } else {
            alert("Tu navegador no soporta geolocalización.");
        }
    } else {
        alert("No se compartió la ubicación.");
    }
}

// ====== PayPal solo ======
paypal.Buttons({
    createOrder: function(data, actions){
        let total = carrito.reduce((acc, item) => acc + (Number(item.precio)*item.cantidad),0);
        return actions.order.create({
            purchase_units: [{ amount: { value: total.toFixed(2) } }]
        });
    },
    onApprove: function(data, actions){
        return actions.order.capture().then(async function(details){
            let nombre = document.getElementById("nombre").value.trim();
            let direccion = document.getElementById("direccion").value.trim();

            if(!nombre || !direccion){
                alert("Por favor completa nombre y dirección.");
                return;
            }

            let total = carrito.reduce((acc, item) => acc + (Number(item.precio)*item.cantidad),0);

            try{
                const response = await fetch(`${API}/api/pedidos`,{
                    method:"POST",
                    headers:{ "Content-Type":"application/json" },
                    body: JSON.stringify({
                        usuario: usuario.correo,
                        nombreCliente: nombre,
                        direccion: direccion,
                        productos: carrito,
                        total: total
                    })
                });

                const data = await response.json();

                if(response.ok){
                    alert("✅ Pago realizado y pedido registrado 🎉");
                    localStorage.removeItem("carrito");
                    window.location.href = "mis-pedidos.html";
                }else{
                    alert(data.mensaje || "Error al registrar el pedido.");
                }
            }catch(err){
                alert("Error de conexión con el servidor.");
            }
        });
    }
}).render('#paypal-button-container');

</script>

</body>
</html>
